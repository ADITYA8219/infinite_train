<!DOCTYPE html>
<html>
<head>
    <title>Animation Delay</title>
    <style>
        @keyframes fadeInOut {
            0%, 100% {
                opacity: 0;
            }

            50% {
                opacity: 1;
            }
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: #dc3545;
            animation-name: fadeInOut;
            animation-duration: 3s;
            animation-delay: 2s; /* Waits 2 seconds before starting */
            animation-iteration-count: infinite; /* Restarts the animation indefinitely */
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
